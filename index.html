    // === Filter Config ===
    const FILTER_CONFIG = {
        taste: { label: "口味", options: ["辣", "清淡", "咸香", "酸甜", "麻辣"] },
        type: { label: "类型", options: ["主食", "小吃", "汤粉面", "烧烤", "炸物", "甜品饮品"] },
        scenario: { label: "场景", options: ["快速解决", "好好吃一顿", "夜宵", "下午茶"] },
    };

    const activeFilters = { taste: new Set(), type: new Set(), scenario: new Set() };

    function getFilteredFoods() {
        return ALL_FOODS.filter(food => {
            for (const key of Object.keys(activeFilters)) {
                if (activeFilters[key].size > 0 && !activeFilters[key].has(food[key])) {
                    return false;
                }
            }
            return true;
        });
    }

    // === Render Filters ===
    function renderFilters() {
        const section = document.getElementById("filterSection");
        section.innerHTML = "";
        for (const [key, config] of Object.entries(FILTER_CONFIG)) {
            const group = document.createElement("div");
            group.className = "filter-group";
            group.innerHTML = '<div class="filter-group-title">' + config.label + '</div>';
            const tagsDiv = document.createElement("div");
            tagsDiv.className = "filter-tags";
            for (const option of config.options) {
                const tag = document.createElement("span");
                tag.className = "filter-tag" + (activeFilters[key].has(option) ? " active" : "");
                tag.textContent = option;
                tag.addEventListener("click", () => {
                    if (activeFilters[key].has(option)) {
                        activeFilters[key].delete(option);
                    } else {
                        activeFilters[key].add(option);
                    }
                    renderFilters();
                    renderWheel();
                });
                tagsDiv.appendChild(tag);
            }
            group.appendChild(tagsDiv);
            section.appendChild(group);
        }
    }

    // === Wheel ===
    const WHEEL_COLORS = [
        "#FF6B6B", "#FFA07A", "#FFD700", "#FF8CA1",
        "#FFB347", "#FF7F7F", "#FFC3A0", "#FF9A9E",
    ];

    let currentFoods = [];
    let currentRotation = 0;
    let isSpinning = false;

    function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function renderWheel() {
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const r = cx - 4;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const filtered = getFilteredFoods();

        if (filtered.length === 0) {
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, 2 * Math.PI);
            ctx.fillStyle = "#FFE0EC";
            ctx.fill();
            ctx.fillStyle = "#FF6B6B";
            ctx.font = "bold 28px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("没有匹配的美食", cx, cy - 10);
            ctx.font = "24px sans-serif";
            ctx.fillText("试试减少筛选条件~", cx, cy + 25);
            currentFoods = [];
            return;
        }

        const count = Math.max(3, Math.min(8, filtered.length));
        currentFoods = shuffleArray(filtered).slice(0, count);

        const sliceAngle = (2 * Math.PI) / currentFoods.length;

        currentFoods.forEach((food, i) => {
            const startAngle = i * sliceAngle;
            const endAngle = startAngle + sliceAngle;

            // Draw slice
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, r, startAngle, endAngle);
            ctx.closePath();
            ctx.fillStyle = WHEEL_COLORS[i % WHEEL_COLORS.length];
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.6)";
            ctx.lineWidth = 3;
            ctx.stroke();

            // Draw text
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(startAngle + sliceAngle / 2);
            ctx.textAlign = "center";
            ctx.fillStyle = "white";
            ctx.font = "bold 24px sans-serif";
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.shadowBlur = 3;
            ctx.fillText(food.name, r * 0.6, 7);
            ctx.shadowBlur = 0;
            ctx.restore();
        });

        // Outer ring
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, 2 * Math.PI);
        ctx.strokeStyle = "rgba(255,255,255,0.8)";
        ctx.lineWidth = 4;
        ctx.stroke();
    }

    // === Spin Logic ===
    function spin() {
        if (isSpinning || currentFoods.length === 0) return;
        isSpinning = true;

        document.getElementById("resultCard").classList.remove("show");

        const extraSpins = 5 + Math.floor(Math.random() * 3);
        const randomAngle = Math.random() * 360;
        const totalRotation = currentRotation + extraSpins * 360 + randomAngle;

        const canvas = document.getElementById("wheelCanvas");
        canvas.style.transition = "transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99)";
        canvas.style.transform = "rotate(" + totalRotation + "deg)";
        currentRotation = totalRotation;

        if (navigator.vibrate) navigator.vibrate(50);

        setTimeout(() => {
            isSpinning = false;

            // Pointer is at top center (12 o'clock = -90deg = 270deg)
            // Canvas 0deg starts at 3 o'clock (right), so top is -90deg
            const normalizedAngle = ((360 - (totalRotation % 360)) + 270) % 360;
            const sliceDeg = 360 / currentFoods.length;
            const index = Math.floor(normalizedAngle / sliceDeg) % currentFoods.length;
            const selected = currentFoods[index];

            showResult(selected);

            // Reset wheel for next spin
            setTimeout(() => {
                canvas.style.transition = "none";
                currentRotation = currentRotation % 360;
                canvas.style.transform = "rotate(" + currentRotation + "deg)";
                renderWheel();
            }, 500);
        }, 3100);
    }

    function showResult(food) {
        document.getElementById("resultName").textContent = food.name;
        document.getElementById("resultDesc").textContent = food.desc;
        document.getElementById("resultTags").innerHTML =
            '<span class="result-tag">' + food.taste + '</span>' +
            '<span class="result-tag">' + food.type + '</span>' +
            '<span class="result-tag">' + food.scenario + '</span>';
        document.getElementById("resultCard").classList.add("show");
        if (navigator.vibrate) navigator.vibrate([50, 30, 100]);
    }

    // === Event Binding ===
    document.getElementById("spinBtn").addEventListener("click", spin);

    // === Init ===
    renderFilters();
    renderWheel();
